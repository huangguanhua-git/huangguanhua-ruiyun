#cloud-config

chpasswd:
  list: |
    ubuntu:x4zAPiU9E8
  expire: False

disable_root: false
ssh_pwauth: true

runcmd:
  - cp /etc/apt/sources.list /etc/apt/sources.list.bak
  - sudo sed -i "/update_etc_hosts/c \ - ['update_etc_hosts', 'once-per-instance']" /etc/cloud/cloud.cfg
  - sed -i 's/^#Port 2222/Port 22/' /etc/ssh/sshd_config
  - sed -i 's/^Port 2222/Port 22/' /etc/ssh/sshd_config
  - apt update

users:
  - default
  - name: root
    ssh_authorized_keys:
      - ssh-rsa  root@sj-x86-maas
